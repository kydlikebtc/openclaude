global:
  resolve_timeout: 5m
  # 告警重发间隔默认为 4h（各 route 可覆盖）

# ----------------------------------------------------------------
# 路由规则
# ----------------------------------------------------------------
route:
  receiver: 'slack-default'
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  group_by: ['alertname', 'team', 'severity']

  routes:
    # P0 Critical：10s 内发送，每小时重复
    - match:
        severity: critical
      receiver: 'slack-critical'
      group_wait: 10s
      repeat_interval: 1h

    # Backend 团队告警
    - match:
        team: backend
      receiver: 'slack-backend'
      group_wait: 30s

    # Ops 团队告警
    - match:
        team: ops
      receiver: 'slack-ops'

# ----------------------------------------------------------------
# 告警抑制规则
# ----------------------------------------------------------------
inhibit_rules:
  # BackendDown 时抑制延迟/错误率告警（次级症状）
  - source_match:
      alertname: 'BackendDown'
    target_match_re:
      alertname: 'HighAPILatencyWarning|HighAPILatencyCritical|HighErrorRate'
    equal: ['instance']

  # PostgreSQLDown critical 时抑制同 instance 的 warning
  - source_match:
      alertname: 'PostgreSQLDown'
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['instance']

  # LowMinerAvailabilityCritical 时抑制 Warning 版本
  - source_match:
      alertname: 'LowMinerAvailabilityCritical'
    target_match:
      alertname: 'LowMinerAvailabilityWarning'

  # HighAPILatencyCritical 时抑制 Warning 版本
  - source_match:
      alertname: 'HighAPILatencyCritical'
    target_match:
      alertname: 'HighAPILatencyWarning'

# ----------------------------------------------------------------
# 接收者
# 环境变量 (通过 --config.expand-env 注入):
#   ALERT_WEBHOOK_URL          — 默认/通用 Slack webhook (必填)
#   ALERT_CRITICAL_WEBHOOK_URL — 专用 critical channel (可选, 默认同上)
#   ALERT_BACKEND_WEBHOOK_URL  — backend 团队 channel (可选, 默认同上)
#   ALERT_OPS_WEBHOOK_URL      — ops 团队 channel (可选, 默认同上)
#   GRAFANA_URL                — Grafana 仪表盘地址 (可选, 默认 http://localhost:3001)
# ----------------------------------------------------------------
receivers:
  - name: 'slack-default'
    slack_configs:
      - api_url: '${ALERT_WEBHOOK_URL}'
        channel: '#openclade-alerts'
        send_resolved: true
        icon_emoji: ':bell:'
        username: 'OpenClade Alertmanager'
        mrkdwn_in: ['text', 'pretext', 'fallback']
        color: '{{ if eq .Status "resolved" }}good{{ else if eq (index .Alerts 0).Labels.severity "critical" }}danger{{ else }}warning{{ end }}'
        pretext: '{{ if eq .Status "resolved" }}:white_check_mark: *[RESOLVED]* {{ else }}:warning: *[FIRING:{{ .Alerts.Firing | len }}]* {{ end }}{{ .GroupLabels.alertname }}'
        title: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        title_link: '${GRAFANA_URL:-http://localhost:3001}/d/openclaude-overview'
        fallback: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        fields:
          - title: '严重度'
            value: '{{ (index .Alerts 0).Labels.severity }}'
            short: true
          - title: '团队'
            value: '{{ (index .Alerts 0).Labels.team }}'
            short: true
          - title: '触发时间'
            value: '{{ (index .Alerts 0).StartsAt.Format "2006-01-02 15:04:05 UTC" }}'
            short: true
          - title: 'Prometheus'
            value: '{{ if (index .Alerts 0).GeneratorURL }}<{{ (index .Alerts 0).GeneratorURL }}|查看图表>{{ else }}N/A{{ end }}'
            short: true
        footer: 'OpenClade Monitoring'
        footer_icon: 'https://prometheus.io/assets/prometheus_logo_grey.svg'

  - name: 'slack-critical'
    slack_configs:
      - api_url: '${ALERT_CRITICAL_WEBHOOK_URL:-${ALERT_WEBHOOK_URL}}'
        channel: '#openclade-critical'
        send_resolved: true
        icon_emoji: ':rotating_light:'
        username: 'OpenClade CRITICAL'
        mrkdwn_in: ['text', 'pretext', 'fallback']
        color: '{{ if eq .Status "resolved" }}good{{ else }}danger{{ end }}'
        pretext: '{{ if eq .Status "resolved" }}:white_check_mark: *[P0 RESOLVED]* {{ else }}:rotating_light: *[P0 CRITICAL — 立即响应]* {{ end }}'
        title: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        title_link: '${GRAFANA_URL:-http://localhost:3001}/d/openclaude-overview'
        fallback: '[CRITICAL] {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        fields:
          - title: '触发时间'
            value: '{{ (index .Alerts 0).StartsAt.Format "2006-01-02 15:04:05 UTC" }}'
            short: true
          - title: '实例'
            value: '{{ (index .Alerts 0).Labels.instance }}'
            short: true
          - title: '运维手册'
            value: '<https://github.com/kydlikebtc/openclaude/blob/main/docs/ops/incident_response.md|事件响应 SOP>'
            short: true
          - title: 'Prometheus'
            value: '{{ if (index .Alerts 0).GeneratorURL }}<{{ (index .Alerts 0).GeneratorURL }}|查看图表>{{ else }}N/A{{ end }}'
            short: true
        footer: 'OpenClade Critical Alerts'
        footer_icon: 'https://prometheus.io/assets/prometheus_logo_grey.svg'

  - name: 'slack-backend'
    slack_configs:
      - api_url: '${ALERT_BACKEND_WEBHOOK_URL:-${ALERT_WEBHOOK_URL}}'
        channel: '#openclade-backend'
        send_resolved: true
        icon_emoji: ':wrench:'
        username: 'OpenClade Alertmanager'
        mrkdwn_in: ['text', 'pretext', 'fallback']
        color: '{{ if eq .Status "resolved" }}good{{ else if eq (index .Alerts 0).Labels.severity "critical" }}danger{{ else }}warning{{ end }}'
        pretext: '{{ if eq .Status "resolved" }}:white_check_mark: *[Backend 告警恢复]* {{ else }}:wrench: *[Backend 告警]* {{ end }}'
        title: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        title_link: '${GRAFANA_URL:-http://localhost:3001}/d/openclaude-overview'
        fallback: '[Backend] {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        fields:
          - title: '严重度'
            value: '{{ (index .Alerts 0).Labels.severity }}'
            short: true
          - title: '时间'
            value: '{{ (index .Alerts 0).StartsAt.Format "15:04:05 UTC" }}'
            short: true
        footer: 'OpenClade Backend'

  - name: 'slack-ops'
    slack_configs:
      - api_url: '${ALERT_OPS_WEBHOOK_URL:-${ALERT_WEBHOOK_URL}}'
        channel: '#openclade-ops'
        send_resolved: true
        icon_emoji: ':bar_chart:'
        username: 'OpenClade Alertmanager'
        mrkdwn_in: ['text', 'pretext', 'fallback']
        color: '{{ if eq .Status "resolved" }}good{{ else if eq (index .Alerts 0).Labels.severity "critical" }}danger{{ else }}warning{{ end }}'
        pretext: '{{ if eq .Status "resolved" }}:white_check_mark: *[Ops 告警恢复]* {{ else }}:bar_chart: *[Ops 告警]* {{ end }}'
        title: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        title_link: '${GRAFANA_URL:-http://localhost:3001}/d/openclaude-overview'
        fallback: '[Ops] {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
        text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'
        fields:
          - title: '严重度'
            value: '{{ (index .Alerts 0).Labels.severity }}'
            short: true
          - title: '时间'
            value: '{{ (index .Alerts 0).StartsAt.Format "15:04:05 UTC" }}'
            short: true
        footer: 'OpenClade Ops'
