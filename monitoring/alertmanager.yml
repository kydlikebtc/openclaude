global:
  resolve_timeout: 5m
  # 告警重发间隔默认为 4h（各 route 可覆盖）
  # SMTP（可选）: 通过环境变量注入 smtp_smarthost / smtp_from

# ----------------------------------------------------------------
# 路由规则
# ----------------------------------------------------------------
route:
  receiver: 'slack-default'
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  group_by: ['alertname', 'team', 'severity']

  routes:
    # P0 Critical：10s 内发送，每小时重复
    - match:
        severity: critical
      receiver: 'slack-critical'
      group_wait: 10s
      repeat_interval: 1h

    # Backend 团队告警
    - match:
        team: backend
      receiver: 'slack-backend'
      group_wait: 30s

    # Ops 团队告警
    - match:
        team: ops
      receiver: 'slack-ops'

# ----------------------------------------------------------------
# 告警抑制规则
# ----------------------------------------------------------------
inhibit_rules:
  # BackendDown 时抑制延迟/错误率告警（次级症状）
  - source_match:
      alertname: 'BackendDown'
    target_match_re:
      alertname: 'HighAPILatencyWarning|HighAPILatencyCritical|HighErrorRate'
    equal: ['instance']

  # PostgreSQLDown critical 时抑制同 instance 的 warning
  - source_match:
      alertname: 'PostgreSQLDown'
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['instance']

  # LowMinerAvailabilityCritical 时抑制 Warning 版本
  - source_match:
      alertname: 'LowMinerAvailabilityCritical'
    target_match:
      alertname: 'LowMinerAvailabilityWarning'

  # HighAPILatencyCritical 时抑制 Warning 版本
  - source_match:
      alertname: 'HighAPILatencyCritical'
    target_match:
      alertname: 'HighAPILatencyWarning'

# ----------------------------------------------------------------
# 接收者
# 环境变量:
#   SLACK_WEBHOOK_URL         — 默认/通用 Slack webhook
#   SLACK_CRITICAL_WEBHOOK_URL — 专用 critical channel（可同上）
#   SLACK_BACKEND_WEBHOOK_URL  — backend 团队 channel
#   SLACK_OPS_WEBHOOK_URL      — ops 团队 channel
# ----------------------------------------------------------------
receivers:
  - name: 'slack-default'
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_URL:-http://localhost:9999/webhook}'
        channel: '#openclade-alerts'
        send_resolved: true
        icon_emoji: ':bell:'
        username: 'OpenClade Alertmanager'
        title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *告警*: {{ .Annotations.summary }}
          *详情*: {{ .Annotations.description }}
          *严重度*: {{ .Labels.severity }}
          *时间*: {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          {{ if .GeneratorURL }}*查看*: <{{ .GeneratorURL }}|Prometheus>{{ end }}
          {{ end }}
        color: '{{ if eq .Status "resolved" }}good{{ else if eq (index .Alerts 0).Labels.severity "critical" }}danger{{ else }}warning{{ end }}'

  - name: 'slack-critical'
    slack_configs:
      - api_url: '${SLACK_CRITICAL_WEBHOOK_URL:-${SLACK_WEBHOOK_URL:-http://localhost:9999/webhook}}'
        channel: '#openclade-critical'
        send_resolved: true
        icon_emoji: ':rotating_light:'
        username: 'OpenClade CRITICAL'
        title: ':rotating_light: [CRITICAL] {{ .GroupLabels.alertname }} — 立即响应'
        text: |
          {{ range .Alerts }}
          *【P0 紧急告警】*
          *告警*: {{ .Annotations.summary }}
          *详情*: {{ .Annotations.description }}
          *触发时间*: {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          *运维手册*: <https://github.com/kydlikebtc/openclaude/blob/main/docs/ops/incident_response.md|事件响应 SOP>
          {{ if .GeneratorURL }}*Prometheus*: <{{ .GeneratorURL }}|查看图表>{{ end }}
          {{ end }}
        color: 'danger'

  - name: 'slack-backend'
    slack_configs:
      - api_url: '${SLACK_BACKEND_WEBHOOK_URL:-${SLACK_WEBHOOK_URL:-http://localhost:9999/webhook}}'
        channel: '#openclade-backend'
        send_resolved: true
        icon_emoji: ':wrench:'
        username: 'OpenClade Alertmanager'
        title: '[Backend] {{ .Status | toUpper }}: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          *严重度*: {{ .Labels.severity }} | *时间*: {{ .StartsAt.Format "15:04:05" }}
          {{ end }}
        color: '{{ if eq .Status "resolved" }}good{{ else if eq (index .Alerts 0).Labels.severity "critical" }}danger{{ else }}warning{{ end }}'

  - name: 'slack-ops'
    slack_configs:
      - api_url: '${SLACK_OPS_WEBHOOK_URL:-${SLACK_WEBHOOK_URL:-http://localhost:9999/webhook}}'
        channel: '#openclade-ops'
        send_resolved: true
        icon_emoji: ':bar_chart:'
        username: 'OpenClade Alertmanager'
        title: '[Ops] {{ .Status | toUpper }}: {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          *严重度*: {{ .Labels.severity }} | *时间*: {{ .StartsAt.Format "15:04:05" }}
          {{ end }}
        color: '{{ if eq .Status "resolved" }}good{{ else if eq (index .Alerts 0).Labels.severity "critical" }}danger{{ else }}warning{{ end }}'
