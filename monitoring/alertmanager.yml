global:
  # 告警重发间隔（相同告警再次发送的间隔）
  resolve_timeout: 5m
  # SMTP 配置（可选，用于邮件通知）
  # smtp_smarthost: 'smtp.example.com:587'
  # smtp_from: 'alertmanager@openclaude.io'
  # smtp_auth_username: '${SMTP_USERNAME}'
  # smtp_auth_password: '${SMTP_PASSWORD}'

# 告警路由规则
route:
  # 默认接收者
  receiver: 'default'
  # 同一组告警聚合等待时间
  group_wait: 30s
  # 同一组新增告警的发送间隔
  group_interval: 5m
  # 同一告警重复发送间隔
  repeat_interval: 4h
  # 按 alertname 和 team 分组
  group_by: ['alertname', 'team', 'severity']

  routes:
    # Critical 告警路由到紧急通道
    - match:
        severity: critical
      receiver: 'critical-alerts'
      group_wait: 10s
      repeat_interval: 1h

    # Miner 相关告警
    - match:
        team: backend
      receiver: 'backend-team'
      group_wait: 30s

    # 运维告警
    - match:
        team: ops
      receiver: 'ops-team'

# 告警抑制规则
inhibit_rules:
  # 如果 BackendDown 触发，抑制 HighAPILatency 和 HighErrorRate 告警
  - source_match:
      alertname: 'BackendDown'
    target_match_re:
      alertname: 'HighAPILatency|HighErrorRate'
    equal: ['instance']

  # 如果 PostgreSQLDown 触发，抑制数据库相关的次要告警
  - source_match:
      alertname: 'PostgreSQLDown'
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['instance']

receivers:
  - name: 'default'
    # 默认接收者：webhook（可配置为飞书/微信/Slack）
    webhook_configs:
      - url: '${ALERT_WEBHOOK_URL:-http://localhost:9999/webhook}'
        send_resolved: true
        http_config:
          follow_redirects: true
        # 自定义告警消息格式
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *告警*: {{ .Annotations.summary }}
          *详情*: {{ .Annotations.description }}
          *严重度*: {{ .Labels.severity }}
          *时间*: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

  - name: 'critical-alerts'
    webhook_configs:
      - url: '${ALERT_WEBHOOK_URL:-http://localhost:9999/webhook}'
        send_resolved: true
        title: '🚨 [CRITICAL] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *【P0 紧急告警】*
          *告警*: {{ .Annotations.summary }}
          *详情*: {{ .Annotations.description }}
          *时间*: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          ---
          立即响应：参考 docs/ops/incident_response.md
          {{ end }}

  - name: 'backend-team'
    webhook_configs:
      - url: '${ALERT_WEBHOOK_URL:-http://localhost:9999/webhook}'
        send_resolved: true
        title: '[Backend] {{ .GroupLabels.alertname }}'

  - name: 'ops-team'
    webhook_configs:
      - url: '${ALERT_WEBHOOK_URL:-http://localhost:9999/webhook}'
        send_resolved: true
        title: '[Ops] {{ .GroupLabels.alertname }}'
