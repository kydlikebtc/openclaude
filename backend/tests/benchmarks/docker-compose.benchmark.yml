services:
  mock-anthropic:
    image: python:3.11-slim
    command: >
      sh -c "pip install fastapi uvicorn --quiet &&
             uvicorn tests.benchmarks.mock_anthropic_server:app
             --host 0.0.0.0 --port 9999 --workers 4"
    working_dir: /app
    volumes:
      - ../../:/app
    ports:
      - "9999:9999"
    environment:
      MOCK_LATENCY_MS: "10"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9999/health')\""]
      interval: 5s
      timeout: 5s
      retries: 5
